name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.release-notes.outputs.release_body }}
      current_tag: ${{ steps.release-notes.outputs.current_tag }}
      version: ${{ steps.release-notes.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release body
        id: release-notes
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            current_tag="${GITHUB_REF_NAME}"
          else
            version="$(sed -n 's/.*"version": "\(.*\)".*/\1/p' apps/desktop/package.json | head -n1)"
            if [[ -z "$version" ]]; then
              echo "Failed to determine desktop version" >&2
              exit 1
            fi
            current_tag="v${version}"
          fi

          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          version="${current_tag#v}"

          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          delimiter="CCEM_RELEASE_BODY_$(date +%s)"

          {
            echo "release_body<<${delimiter}"
            echo "## CCEM Desktop v${version}"
            echo
            echo "### Downloads"
            echo "- **Apple Silicon (M1/M2/M3/M4)**: \`CCEM-Desktop_*_aarch64.dmg\`"
            echo "- **Intel Mac**: \`CCEM-Desktop_*_x64.dmg\`"
            echo
            echo "### CLI"
            echo '```bash'
            echo "npm install -g ccem@${version}"
            echo '```'
            echo
            echo "### Important"
            echo "run the following instruction to avoid the apple sign check."
            echo
            echo '```bash'
            echo 'xattr -c /Applications/CCEM\ Desktop.app'
            echo '```'
            echo
            echo "### Commits"
            if [[ -n "$previous_tag" ]]; then
              git log "${previous_tag}..${GITHUB_SHA}" --reverse --pretty=format:'- %s (%h)'
            else
              git log --reverse --pretty=format:'- %s (%h)'
            fi
            echo
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build core package
        run: pnpm --filter @ccem/core build

      - name: Detect Apple signing config
        id: apple-signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Using Apple code signing"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple code signing not configured; building unsigned artifacts"
          fi

      - name: Validate updater signing config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required because updater artifacts are enabled." >&2
            echo "Generate it with: cd apps/desktop && pnpm tauri signer generate -w ~/.tauri/ccem-updater.key" >&2
            exit 1
          fi

      - name: Build and release (signed)
        if: ${{ steps.apple-signing.outputs.enabled == 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: 'CCEM v__VERSION__'
          releaseBody: ${{ needs.prepare-release.outputs.release_body }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Build and release (unsigned)
        if: ${{ steps.apple-signing.outputs.enabled != 'true' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: 'CCEM v__VERSION__'
          releaseBody: ${{ needs.prepare-release.outputs.release_body }}
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  publish-updater-manifest:
    name: Publish Updater Manifest
    needs: [prepare-release, build-desktop]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.build-desktop.result == 'success' }}

    steps:
      - name: Publish combined latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare-release.outputs.current_tag }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${REPO}"
          auth_headers=(
            -H "Authorization: Bearer ${GITHUB_TOKEN}"
            -H "Accept: application/vnd.github+json"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          release_json="$(mktemp)"
          curl -fsSL "${auth_headers[@]}" "${api}/releases/tags/${TAG_NAME}" > "$release_json"

          release_id="$(jq -r '.id' "$release_json")"
          upload_url="$(jq -r '.upload_url' "$release_json" | sed 's/{.*//')"

          asset_url() {
            jq -r --arg name "$1" '.assets[] | select(.name == $name) | .browser_download_url' "$release_json" | head -n1
          }

          asset_url_any() {
            local candidate
            for candidate in "$@"; do
              local url
              url="$(asset_url "$candidate")"
              if [[ -n "$url" && "$url" != "null" ]]; then
                echo "$url"
                return 0
              fi
            done
          }

          aarch64_bundle_url="$(asset_url_any 'CCEM.Desktop_aarch64.app.tar.gz' 'CCEM Desktop_aarch64.app.tar.gz')"
          aarch64_sig_url="$(asset_url_any 'CCEM.Desktop_aarch64.app.tar.gz.sig' 'CCEM Desktop_aarch64.app.tar.gz.sig')"
          x64_bundle_url="$(asset_url_any 'CCEM.Desktop_x64.app.tar.gz' 'CCEM Desktop_x64.app.tar.gz')"
          x64_sig_url="$(asset_url_any 'CCEM.Desktop_x64.app.tar.gz.sig' 'CCEM Desktop_x64.app.tar.gz.sig')"

          for value in "$aarch64_bundle_url" "$aarch64_sig_url" "$x64_bundle_url" "$x64_sig_url"; do
            if [[ -z "$value" || "$value" == "null" ]]; then
              echo "Missing updater bundle or signature asset for ${TAG_NAME}" >&2
              jq -r '.assets[].name' "$release_json" >&2
              exit 1
            fi
          done

          aarch64_sig="$(curl -fsSL "$aarch64_sig_url" | tr -d '\r\n')"
          x64_sig="$(curl -fsSL "$x64_sig_url" | tr -d '\r\n')"
          pub_date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          notes="See https://github.com/${REPO}/releases/tag/${TAG_NAME}"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$notes" \
            --arg pub_date "$pub_date" \
            --arg aarch64_url "$aarch64_bundle_url" \
            --arg aarch64_sig "$aarch64_sig" \
            --arg x64_url "$x64_bundle_url" \
            --arg x64_sig "$x64_sig" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $aarch64_sig,
                  url: $aarch64_url
                },
                "darwin-x86_64": {
                  signature: $x64_sig,
                  url: $x64_url
                }
              }
            }' > latest.json

          existing_latest_id="$(jq -r '.assets[] | select(.name == "latest.json") | .id' "$release_json" | head -n1)"
          if [[ -n "$existing_latest_id" && "$existing_latest_id" != "null" ]]; then
            curl -fsSL -X DELETE "${auth_headers[@]}" "${api}/releases/assets/${existing_latest_id}"
          fi

          curl -fsSL -X POST \
            "${auth_headers[@]}" \
            -H "Content-Type: application/json" \
            --data-binary @latest.json \
            "${upload_url}?name=latest.json"

  # Universal binary (optional — combines both architectures)
  create-universal:
    name: Create Universal Binary
    needs: build-desktop
    runs-on: macos-latest
    if: ${{ !cancelled() && needs.build-desktop.result == 'success' }}

    steps:
      - name: Note
        run: |
          echo "Universal binary creation can be added later if needed."
          echo "For now, both aarch64 and x86_64 DMGs are uploaded to the release."
